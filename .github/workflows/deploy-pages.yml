name: Build and deploy registry site

# Pipeline 'covers' decouple : ce workflow ne re-telecharge PAS les
# pochettes Discogs a chaque deploiement. Les images vivent dans
# site/covers/ (commitees au repo) et l'index dans
# site/data/covers-index.json (egalement commit). La regeneration est
# manuelle, via 'python scripts/fetch_discogs_covers.py' depuis un
# environnement avec acces a api.discogs.com et i.discogs.com -- a
# faire ponctuellement quand de nouvelles entrees discogs_url sont
# ajoutees aux YAML, suivi d'un commit du delta.
# Le workflow se contente donc de generer all-variants.json puis de
# publier site/ tel quel (covers comprises) comme artefact Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build site data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install --no-cache-dir PyYAML

      - name: Build site data
        run: python scripts/build_site_data.py

      - name: Verify output
        run: |
          test -f site/data/all-variants.json || { echo "Output missing"; exit 1; }
          size=$(stat -c %s site/data/all-variants.json)
          echo "all-variants.json size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "Output exceeds 10 MB safety threshold"; exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
