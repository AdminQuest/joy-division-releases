# Patterns regex pour parser les chaines libres "Format" du legacy.
# Le matching est ordonne : le premier pattern qui matche gagne.
#
# Architecture :
#   - patterns : detection du support_type / count / size. Pas de color
#     ici, la color est extraite par un post-processor dedie qui scrute
#     la chaine format ET la colonne Version du legacy.
#   - mixed_audio_video_patterns : detection des formats mixtes (CD+DVD)
#     reclasses en coffret_skip.
#   - box_set_patterns : detection des box sets / coffrets multi-formats,
#     reclasses en coffret_skip.
#   - video_patterns : detection du support video pour les fichiers
#     VHS & DVD.
#
# Quand aucun pattern ne matche, le variant est produit en
# documentation_quality: needs_review avec un support generique
# (vinyl x1) a corriger manuellement.

patterns:
  # 0a. Splatter LP avec couleurs specifiques optionnelles (v3, specifique)
  #     Ex: "splatter LP", "splatter LP orange black", "splatter LP green black"
  - regex: '(?i)^splatter\s+LP(?:\s+(.+))?$'
    result:
      support_type: vinyl
      size: '12"'
      color: 'splatter'
      color_detail_from_group: 1

  # 0b. Version numerotee suivie de format LP (v3, capture version_marker)
  #     Ex: "V1 : USA, 2019, LP (#42/50)", "V2 : 3 LP"
  - regex: '(?i)^V\d+\s*:\s*.*?(\d+)?\s*LP'
    result:
      support_type: vinyl
      size: '12"'
      count_from_group: 1
      version_marker_extracted: true

  # 0c. Couleur unique + LP (v3, generique simple)
  #     Ex: "white LP", "red LP", "purple LP"
  #     Note: limite a [A-Za-z]+ pour eviter les faux positifs "5 LP" (capture la couleur).
  - regex: '(?i)^([A-Za-z]+)\s+LP\s*$'
    result:
      support_type: vinyl
      size: '12"'
      color_from_group: 1

  # 1. Variantes textuelles d'abord (LP precede d'un color descriptor).
  #    Ex: "white LP", "Red translucent marbled LP", "Splatter LP",
  #        "Sunrise Splatter LP"
  - regex: '(?i)^(?:V\d+\s*:\s*)?(\d*)\s*x?\s*[A-Za-z]+(?:\s+[A-Za-z]+)*\s+LP\s*$'
    result:
      support_type: vinyl
      size: '12"'
      count_group: 1

  # 2. "V1 : 3 LP", "V2 : 3 CDr", etc.
  - regex: '(?i)^V\d+\s*:\s*(\d+)\s*[xX]?\s*LP\b'
    result:
      support_type: vinyl
      size: '12"'
      count_group: 1
  - regex: '(?i)^V\d+\s*:\s*(\d+)\s*[xX]?\s*CD\b'
    result:
      support_type: cd
      count_group: 1

  # 3. Vinyles "N LP" ou "LP" en chef de chaine
  - regex: '(?i)^(\d+)\s*[xX]?\s*LP\b'
    result:
      support_type: vinyl
      size: '12"'
      count_group: 1
  - regex: '(?i)^LP\b'
    result:
      support_type: vinyl
      size: '12"'
      count: 1

  # 3b. CDr (CD-Recordable, v3) — assimile a CD avec note ajoutee.
  #     Doit etre AVANT les patterns CD generiques (sans \b) pour ne
  #     pas etre absorbe par le pattern V<n>:N CD. Le prefixe V<n>:
  #     est optionnel et capture par version_marker_extracted.
  - regex: '(?i)^(?:V\d+\s*:\s*)?(\d+)?\s*x?\s*CDr\b'
    result:
      support_type: cd
      count_from_group: 1
      cdr_in_notes: true
      version_marker_extracted: true

  # 4. CD : "N CD", "CD", "💿 CD" (avec emoji ou autre prefixe symbolique)
  - regex: '(?i)^[\W_]*\s*(\d+)\s*[xX]?\s*CD\b'
    result:
      support_type: cd
      count_group: 1
  - regex: '(?i)^[\W_]*\s*CD\b'
    result:
      support_type: cd
      count: 1

  # 5. Cassettes
  - regex: '(?i)^(\d+)\s*[xX]?\s*(?:K7|cassette)'
    result:
      support_type: cassette
      count_group: 1
  - regex: '(?i)^(?:K7|cassette)'
    result:
      support_type: cassette
      count: 1

  # 6. Flexi
  - regex: '(?i)^(\d+)\s*[xX]?\s*7["’”'']+\s*(?:SP\s*)?flexi'
    result:
      support_type: flexi
      size: '7"'
      count_group: 1
  - regex: '(?i)^7["’”'']+\s*(?:SP\s*)?flexi'
    result:
      support_type: flexi
      size: '7"'
      count: 1
  - regex: '(?i)flexi'
    result:
      support_type: flexi
      count: 1

  # 7. Vinyles avec taille explicite : 7", 10", 12"
  - regex: '(?i)^(\d+)\s*[xX]?\s*7["’”'']'
    result:
      support_type: vinyl
      size: '7"'
      count_group: 1
  - regex: '(?i)^7["’”'']'
    result:
      support_type: vinyl
      size: '7"'
      count: 1
  - regex: '(?i)^(\d+)\s*[xX]?\s*10["’”'']'
    result:
      support_type: vinyl
      size: '10"'
      count_group: 1
  - regex: '(?i)^10["’”'']'
    result:
      support_type: vinyl
      size: '10"'
      count: 1
  - regex: '(?i)^(\d+)\s*[xX]?\s*12["’”'']'
    result:
      support_type: vinyl
      size: '12"'
      count_group: 1
  - regex: '(?i)^12["’”'']'
    result:
      support_type: vinyl
      size: '12"'
      count: 1

  # 8. EP / SP / Maxi : suppose 12" vinyl par defaut
  - regex: '(?i)^EP\b'
    result:
      support_type: vinyl
      size: '12"'
      count: 1
  - regex: '(?i)^SP\b'
    result:
      support_type: vinyl
      size: '7"'
      count: 1
  - regex: '(?i)^maxi'
    result:
      support_type: vinyl
      size: '12"'
      count: 1

  # 9. Picture disc et test pressing : capture la couleur traillante
  - regex: '(?i)^pic(?:ture)?\s*disc'
    result:
      support_type: vinyl
      size: '12"'
      count: 1
      color_default: 'picture disc'
  - regex: '(?i)test\s*pressing'
    result:
      support_type: vinyl
      size: '12"'
      count: 1
      color_default: 'test pressing'

# Formats mixtes : audio + video sur une meme ligne.
# Ces lignes sont reclassees en coffret_skip (traitees manuellement
# en seconde passe).
mixed_audio_video_patterns:
  - '(?i)CD\s*\+\s*DVD'
  - '(?i)LP\s*\+\s*DVD'
  - '(?i)CD\s*\+\s*VHS'
  - '(?i)CD\s*\+\s*Blu[\s-]?ray'
  - '(?i)DVD\s*\+\s*CD'

# Box Set patterns : detection des coffrets multi-formats
# (cas typique des bootlegs "Box Set Version 1" avec 4 LPs + CD).
# Reclasses en coffret_skip.
box_set_patterns:
  - '(?i)^Box\s+Set'
  - '(?i)^Tote\s+Bag'
  - '(?i)boxed\s+CD'

# Tokens de couleur reconnus (post-processor color extraction).
# Le post-processor capture les sequences contiguees de ces tokens
# dans la chaine format (et dans la colonne Version) pour produire
# le champ supports[].color.
color_tokens:
  - splatter
  - swirl
  - marbled
  - translucent
  - transparent
  - black
  - white
  - red
  - blue
  - green
  - yellow
  - orange
  - purple
  - pink
  - gold
  - silver
  - brown
  - grey
  - gray
  - ivory
  - amber
  - clear
  - smoke
  - dark
  - light

# Patterns pour identifier le type video dans les fichiers VHS & DVD.
video_patterns:
  - regex: '(?i)Blu[\s-]?ray'
    support_type: bluray
  - regex: '(?i)DVD'
    support_type: dvd
  - regex: '(?i)VHS'
    support_type: vhs
  - regex: '(?i)UMD'
    support_type: umd
