notes: "Stylus Groove \nLimited Edition Hand Numbered on Gossamer Grey Vinyl\nA selection of the very best concert performances\
  \ from the iconic second Joy Division album Closer combined with the non-album singles Love Will Tear Us Apart and Transmission.\
  \ This is a rare opportunity to enjoy the raw energy of this seminal band in concert. The sound of Joy division on stage\
  \ is far removed from the highly polished studio sound created by producer Martin Hannett which so frustrated Peter Hook.\
  \ This is as close as it gets to experiencing the authentic doom-laden sound of Joy Division envisaged by the band. Play\
  \ it loud."
