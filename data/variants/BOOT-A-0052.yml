notes: 'R7. Limited edition of 100 copies. White or grey cover version

  The sleeve is the same as two of the sleeves in the Mater Dolorosa box set - except that it''s not marbled. It has a quote
  from "Little Dead" (N.Order''s "Denial") on the back cover.

  This single has been released under different names as a 7" single and in box sets which contain multiple copies of the
  single. See the Visitor, Visitor Box Set, Mater Dolorosa box set

  It appears that this single was the first to be released - possibly about a year before the other versions came out.'
