notes: 'V9 newspaper : mid 1980s. Stiff, black, cardboard sleeve with photocopied inserts. Matrix number: JD ¾. The record
  & labels are identical to the reissued Box File "Warsaw" LP; the labels are black on green, and depict a drawing of a man
  reading a newspaper (same on both sides). The matrix number/run-off groove notations are JD-3 (side 1) and JD-4 (side 2).
  The track-lisiting is the same as the original (and Box File) version. It appears that all three of the records in the reissue
  of the box set have been released individually in poor quality covers. Maybe they ran out of boxes. See also: Box set reissue,
  Komackino and Le Terme'
