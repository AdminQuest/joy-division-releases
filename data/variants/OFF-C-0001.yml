notes: "Factory ‎– FACT XXV FACT. 25 Dark red translucent vinyl. Plain carton cover with glossy inner sleeve and straight\
  \ corners. Outer cover: thick and rough / textured cardboard sleeve. Inner sleeve: rough / textured with straight corners.\
  \ On translucent red or translucent green vinyl. \nSome copies with the same labels on both sides.\nGroove notations:\n\
  Original UK edition: \"Old blue?\" (side A), supposedly a reference to Frank \"old blue eyes\" Sinatra.\nThe original US\
  \ Closer LP on Factory USA (Factus 6) doesn't have any groove notations.\n\nHow to tell an original UK LP from a UK reissue:\n\
  The original pressing has a textured sleeve & inner, the reissues have smooth sleeves & inners.\nThe original inner sleeve\
  \ has rounded corners, the reissues have regular, square inner sleeves."
