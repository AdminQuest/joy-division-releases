notes: 'Edigsa ‎– 19P0095

  The original pack was made up of 3 items:

  1) An outer white envelope sleeve

  2) Inside this was a 7" picture sleeve with the front cover design lifted from the original 12" issue sleeve.

  Some copies have a blue "DE MAXIMO INTERES" stamp on the back.

  3) Also included were 5" size inserts with pictures of the Love Will Tear Us Apart (12") and Closer sleeves.

  Over the years many copies have lost their inserts and / or one of the sleeves. Complete copies are very rare.'
