notes: 'Coffret français Fnac 2009 (Les Coffrets Cultes) regroupant le documentaire Grant Gee ''Joy Division'' (DVD) et l''album
  Closer (CD). Boîte 26,5 × 29 cm avec 20 photos A4 bord blanc (mostly N&B, quelques couleurs ; photographes Kevin Cummins,
  Chris Mills, Martin O''Neill, Lex van Rossen, Rob Verhorst). Front : Ian Curtis à Brussels Plan K 16/10/1979 par Philippe
  Carly. Inclut un livret 24×27,5 cm 8 pages en français (non agrafé) et un dépliant promo A5 4 pages. Les disques sont fournis
  sans leurs pochettes individuelles.'
