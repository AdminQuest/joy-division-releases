notes: "Virgin ‎– VCL 5003.  Printed insert sleeve contains a history of The Electric Circus venue and line-ups of the bands\
  \ featured on the EP. Some copies included a pink vinyl 7\" version of John Dowie's \"Another Close Shave\". Some copies\
  \ included a dark blue promotional poster (folded in six segments) that contained a circuit diagram, band and location details,\
  \ and the promotional blurb: \n\"First 5,000 colour pressed on fashionable blue vinyl. Electric Circus. In handy shoplifting\
  \ size. 10\" for £2.99. Out now on Virgin VCL5003\" \nThe 7 inch was totally random - it was included with blue, black and\
  \ even orange promo copies with the original catalogue number VCL 5003 and blue Virgin labels. Some of these randomly had\
  \ an orange sticker to say there was an included 7 inch. Some had no sticker but still included the 7 inch. Some had a full\
  \ promo poster with or without the 7 inch. It was utterly random."
