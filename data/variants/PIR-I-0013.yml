notes: 'V1 : Pirate copy of the official 12" release on Enigma.

  The sleeve is a reproduction of the original 12" cover. The back sleeve (see scan) is different from the original. The record
  came with labels with the band name of "The Dallars". There were some "cut-lick&stick" red insert labels with "Joy Division"
  and the track titles on - you had to stick these labels over the top of the "Dallars" ones.

  Bootleg 7" copy of the 12" issue. Red label, band name as The Dallars. Fold over thin card cover.

  Comes with loose set of labels with band name Joy Division and correct titles and

  "A limited edition re-issue 1982".

  Label as erased (scan), illegible'
