notes: 'Variously referred to as Single Box, Mater Dolorosa Box Set, or The Visitor Box Set, depending on whether you read
  the front of the box,

  the back of the box, or assume the records inside are all variants on The Visitor.


  Limited edition of 12 numbered box sets containing five copies of the single listed above in five different sleeves, plus
  inserts.


  The box is made of light grey / white card and it''s stapled together. The cover image is glued on.


  It contains copies of the singles listed above in either the same sleeves or similar sleeves, a folded numbered insert,
  and a photo insert with

  "This box is limited of 12 sets. Dedicated to Ian Curtis" written on the back.


  Confusingly the folded numbered inserts are numbered out of 35 when there are only 12 box sets. The 35 refers

  to the number of inserts made, meaning some were given away outside the box set, presumably with some of the

  7" singles listed above


