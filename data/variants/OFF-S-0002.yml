  \ shined through the vinyl). Labeled in cream on dark green ground. \nFirst released in August 1980 in the US on Factory\
  \ (US) as She's Lost Control b/w Atmosphere.\nIn October 1980 released in the UK as Facus 2 (UK), with Atmosphere on side\
