  \ in dark red, light brown or teal translucent vinyl (manufacturing variations only). Dark green labels with white typography.\n\
  UK copies:\nSome copies were pressed in dark red translucent vinyl (manufacturing variation only).\nWhite labels with olive\
  \ green typography.\nLicensed editions are from 1981 or later.\nSide A etching either has 1 dot in the top left quadrant\
