notes: '11 Records ‎– ELF 2403. West German LP. Mono. Poor sound quality

  []Limited edition of 500 copies on blue vinyl

  Sometimes this one is called Live Malvern / Eric''s, Live 1979/1980 ELF 2403

  The sleeve has incorrect tracklisting.


  Front cover says: "Recorded live at Winter Gardens, Malvern, April 5, 1980 - with an unreleased jam with SECTION 25 Eric''s,
  Liverpool, August 11, 1979 - with a track never available before". Quite a snappy title

  eh? On the spine it simply says: "Joy Division - Live 1979/1980" and "GEDAR - 003".


  Labels are black with silver writing which reads "Curtis And The Boys", 11 Records, ELF 2403.


  Some copies were seized in a police raid in Germany.'
