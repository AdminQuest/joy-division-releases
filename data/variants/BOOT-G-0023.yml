  Boxed CD VOODOO SOUNDS 2006, version /50 numérotée à la main de l'édition BOOT-G-0002 (CD VOODOO SOUNDS 2005, BG2a). Probablement home-made : photocopies couleur de l'artwork collées sur une boîte cartonnée. Toutes les pistes sont disponibles sur Heart and Soul 4CD set (BOX-H-0001). Source : Mainly studio with three live tracks at the end.

  Conservé comme bootleg standalone (non promu en coffret) — bundling DIY autour d'un CD préexistant, sans pressage neuf ni composant additionnel substantiel.
