notes: 'Contrary to some reports this book isn''t just about the Unknown Pleasures album, although many pages are devoted
  to the recording of that album and the various songs committed to tape during the UP sessions.


  There are plenty of details about how Martin Hannett created the Unknown Pleasures album''s unique sound through his "revolutionary"
  production technique, such as the gadgets he used, etc. A bit technical at times, but interesting nonetheless, even if much
  of this has been covered in previous publications. We also get the full JD story from the early punk days of Stiff Kittens/Warsaw
  up until the final days of the band and Ian''s suicide.


  According to this book Bernard Sumner often refuses to acknowledge that JD were ever known as Warsaw. Rather odd, as it''s
  even stated on the An Ideal For Living 7"EP sleeve - which Barney designed if I''m not much mistaken - that "up until the
  recording date of this E.P. we were known as WARSAW".


