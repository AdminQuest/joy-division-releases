notes: 'Factory ‎– FAC•XXIII•XII, Rough Trade ‎– FAC 23, GAP Records ‎– FAC 23

  First 1983 GAP New Zealand reissue of the 1982 New Zealand Factory/RTC release here.

  This release is identical to the later GAP New Zealand reissue here, except this release has totally different labels sometimes
  referred to as the "Green Man" or "Green Shadow".

  The "Green Man" releases are widely believed to have been industry promotional copies or first press test copies from the
  then new GAP New Zealand company that took over from RTC, although this is unproven. It is confirmed that each of the "Green
  Man" releases was later reissued by EMI New Zealand with the same catalog number and yellow EMI labels.

  Released in two slightly different sleeves, one has a lacquer coating, one does not. Otherwise identical.

  Back Outer Sleeve:

  FAC.XXIII.XII A Factory Records Product

  Released In New Zealand By Gap Records Under License

  Manufactured And Distributed By EMI New Zealand Limited

  Record Labels:

  P) 1982 Factory Records

  Re'
