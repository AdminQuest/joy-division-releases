notes: 'V27 Planet Marseille : 2016, Planet Claire Marseille : Réédition de la Baby Face de 2007. French bootleg released
  2016 Reissue of the LP above with different sleeve and labels. Pressed on heavy black vinyl Record label: Planet Claire
  Records. Catalogue number: PC-375. Glossy sleeve different to LP above, "WARSAW" on front cover and all 17 songs listed
  on the back. States: "Planet Claire Records, 11, la canebière . CS 603340-13211 Marseille Cedex OI. France" - actually the
  address of the the Marseille Office of Tourism and Conventions. WARSAW on the spine. A-side label (which is plain black
  on the other version) lists all the 17 songs ("This side" and "That side"), the B-side label is the same as on the other
  version (wavy lines front cover image detail). No insert.'
