notes: "Hardback' pressing in hessian folder with white ribbon\nStill was an attempt to sweep up any unreleased tracks along\
  \ with a live recording of Joy Division's last concert. It was released partly in response to the number of Joy Division\
  \ bootlegs that had appeared and the title alludes to this; the original bootleggers used stills to distil liquor during\
  \ the prohibition era. \nPlanned for August 1981, it was eventually released on October 8th that year. The first pressing\
  \ was 5000 copies in a hessian sleeve.\nA number of the studio recordings have added post production, including over-dubs\
  \ by the surviving members of the band.\nReleased in clothbound \"hessian\" gatefold cover with a white ribbon. Inner-sleeves\
  \ are die-cut cardboard. The labels are grey on white. A limited number with blue on white labels exist, too. There also\
  \ are editions with a pale blue ribbon existing.\nAs no US edition was ever pressed at the time of first release, UK copies\
  \ were imported to the USA via independent record"
