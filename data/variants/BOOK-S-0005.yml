notes: 'VF : Joy Division, Paroles et Carnets de Notes

  This is a big 274 page 28 x 21cm hardback which is big on content. We''d hoped this would be packed with unpublished images
  of Ian''s notebooks and we''re not disappointed.

  Focussing on his lyrics there''s an initial section with the finished songs featuring the handwritten version on one page
  and the typed up version opposite. This is followed by a large section with handwritten lyrics to unfinished songs, early
  versions and other prose. Finally there''s a section with other items from Ian''s archive - book covers, letters from fans,
  pages from fanzines etc.

  This is clearly a labour of love and Jon Savage explains in the intro how they selected the images for the book - generally
  the most complete version in Ian''s notebooks.

  "His lyrics tell much more than a conversation with him ever could" - Deborah Curtis

  Highly recommended. Je l''ai en version numérique'
