  - role: Volume 1 — LP2 (Misplaced LP2 repressing)
    inline:
      type: vinyl
      format: 12"
      color: clear
      description: Clear vinyl repressing of LP2 from the Misplaced 2LP.
  - role: Volume 2 — 2LP (Asylum Doors / London Lyceum repressing)
    inline:
      type: vinyl
      format: 12"
      color: clear
      description: 2LP clear vinyl repressing of Asylum Doors 2LP (also released as Live At The London Lyceum 2LP).
  - role: Volume 3 — LP1 (Malvern Winter Gardens 5/4/80 repressing)
    inline:
      type: vinyl
      format: 12"
      color: clear
      description: Clear vinyl repressing of Live at Malvern Winter Gardens 5/4/80 2LP (also released as Twenty Four Hours
