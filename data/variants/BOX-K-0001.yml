  - role: Volume 3 — LP2 (Beginning Of The End repressing)
    inline:
      type: vinyl
      format: 12"
      color: clear
      description: Clear vinyl repressing of the Beginning Of The End LP.
  - role: Bonus — The Valley Of The Kings LP (Misplaced LP1)
    inline:
      type: vinyl
      format: 12"
      color: clear
      description: Clear vinyl repressing of LP1 from Misplaced. Plain black labels, plain black sleeve with loose A4 insert
        mentionnant 'Studio Recordings 1978 to 1979 Limited edition 25 copies 2024 The Kings Chamber Muysic GMBH'.
  - role: Bonus surprise — 2LP
    inline:
      type: vinyl
      format: 12"
      description: Unlisted bonus 2LP différent par exemplaire (ex. Warsaw - The Lost 2LP, Moonlight Club Complete Recordings
        2LP).
  - role: Audio — The Moonlight Club CD (2019)
    inline:
      type: cd
      description: The Moonlight Club CD, version 2019, disc only in clear plastic wallet.
  additional_items:
  - type: box
    description: Plain card box with attached lid, finition or. Stickers 15×21 cm avant (Fractured 'f' logo + 'The King's
      Chamber') et arrière ('Limited edition 6 LP* vinyl set, Moonlight Club CD, vinyl mat, 12" insert, numbered postcard'
      — *9 LPs en réalité avec les bonus).
