    description: Black postcard with Fractured 'f' logo, band name et titre. Verso numéroté à la main sur 50.
  - type: slipmat
    description: Black 12 inch slip-mat.
  - type: insert
    description: Black 29,5 × 29,5 cm double-sided insert (track listing sides A à L, sides E/F/G/H = London Lyceum 29/2/80).
      Mentions 'For historical purposes only' et 'A property of the world music alternative archives'.
  - type: packaging
    description: All LPs in clear resealable outer bag, brown corner sticker 'Joy Division The King's Chamber Limited Edition
      Volume 1/2/3' numéroté /50.
