notes: 'This version comes with a textured cover, made by using a standard-weight card sleeve with textured paper applied
  to it. A version with a thick card sleeve with a smooth finish was also released.

  Printed inner sleeve.

  Vinyl appears black but when held up to a light it may appear translucent purple, reddish/brown, brown, green or grey. Note
  that the light source can affect the color seen.

  Some pressings may have the "Inside" and "Outside" labels switched on opposite sides.

  Sleeve spine notation:

  "JOY DIVISION UNKNOWN PLEASURES FACTUS1 A Factory Records (U.S.) Product"

  I Remember Nothing (track B5) ends in a locked loop in the runout area.'
