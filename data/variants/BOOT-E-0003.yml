notes: 'LPs: 14489-105246

  CD: JDE 01

  Double LP on black vinyl + CD released 2019

  20 hand numbered copies. 8/20, sans le CD ni les postcards

  Label: Warehouse Productions USA

  Generic labels with "TEST PRESSING", "Customer", "Date", "Cat.no", "Operator" and "QC checked" printed on them.

  Inserts are:

  Black postcard (same design as LP front cover)

  5 photos 10cm x 15cm - 2 of Ian Curtis and 1 of Bernard Sumner from this gig, hand-written set list, original gig poster

  The CD is housed inside a clear plastic sleeve, the cat.no printed on the CD''s label side is: "JDE 01". This CD was also
  released on its own in a card sleeve

  Claims to be a test pressing but it''s a limited black vinyl version of Europa'
