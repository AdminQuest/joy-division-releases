notes: 'Factory ‎– Fac 13 Repress, Textured Sleeve, Tranco Pressing

  This is a Tranco repress with the following properties similar to Joy Division - Transmission:

  - textured sleeve

  - raised centre

  - squared cut-out on reverse

  - rounded glue flaps

  - white G+L printed on the backside

  - "EG A PORKY PRIME CUT" with additional "A" on side B and "B" on side A in the Matrix/Runout

  - serrated vinyl around the label

  - dark red translucent (Picture shows a more violet colour than it actually is, no strong light is required)

  As known from other JD releases, this has not to be necessarily translucent vinyl - so black copys with this matrix# and
  serrated

  vinyl may exist as well.'
