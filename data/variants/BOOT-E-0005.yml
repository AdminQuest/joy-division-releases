notes: '2810022 12 1987. West-German double LP. Black and white cover. Black and white insert with detailed song info.

  The end of side A features an excerpt from the end of the Vincent Price movie Die Maske des Roten Todes "The Masque Of The
  Red Death" 1966. There''s the sound of breaking glass, some weird music (strings/bells), followed by German dialogue, more
  music, and some laughter.

  At the end of side B: More German dialogue, and soundtrack from the same German film.

  Side C starts with a snippet from Isolation - the last swirling synth noise just before Passover begins - from ''Closer''
  right before the start of New Order''s ''Let''s Go''

  Side D starts with a snippet from the Castle Pub, Manchester Ian Curtis interview, November 1979, right before the start
  of Candidate from the Piccadilly Radio session 4/6/79'
