notes: 'Morte Music Digital-01

  Single LP released 2017

  This is the 2nd LP from the Die Kalten Winde Des Winters 2LP set in a different sleeve. Presumably there were copies left
  over so they were repackaged as a new product.

  Plain black sleeve with a loose front inset

  Plain black labels with a single letter in gothic typeface (C & D)

  The insert states "Morte Music All Rights Reserved ». There is no evidence of a Vol I version of this record. Features the
  second half of the concert. This is not a high quality recording.'
