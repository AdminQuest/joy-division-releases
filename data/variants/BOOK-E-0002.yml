notes: '"In Excessive Flashpoints, Solitary Demands, Darkest Corners: Ian Curtis, Joy Division, Critical Theory, and Me I
  inquire into issues of fundamental and ultimate concern: the meaning, value, and purpose of existence; our responsibility
  to and for others; human beings as complex, multiple, contradictory, and dynamic; the challenge of intimacy and the power
  of love; the quest for authenticity and the struggle for integrity; what it means to be included and excluded along with
  how as well as why this occurs; how social change happens along with what can be the contribution of artistic and cultural
  work toward this transformation; and the ethical responsibility to confront myriad metaphorical ''darknesses'' in our individual
  and social lives, despite how challenging, difficult, and painful such confrontation can so often be. I pursue this inquiry
  by staging a dialogue between critical theory and popular music. I explore how intelligent, sensitive popular music engages
  the same issues as does'
