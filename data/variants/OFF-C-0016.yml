notes: 'Factory ‎– VFACT 111-2

  Published by Fractured Music

  Produced at Britannia Row.

  A Factory Records Product.

  Editado sob Licença por Vimúsica, Lda.

  Backcover has "Tózé Artes Gráficas - Camarate" printed on the lower right corner and a sticker with the record company information.

  Inner sleeve is a regular bag with an opening.

  Some copies have the "Promoção - Proibida Venda" company stamp (promotional copies).

  Rear sleeve tells us that it is also available on cassette - VFACT 112-2

  There were two pressings of this LP: One had a plain inner sleeve (and stated the printers name on the back). The other
  had a lightweight 24" x 12" paper insert, folded once with song titles/ etc.. Both records have the same matrix No.'
