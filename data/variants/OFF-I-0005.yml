notes: 'V3.3 : UK pressing, 2004/2005

  3rd(?) fake reissue of the official 7" release on Enigma.

  Black vinyl. Almost exact replica of original issue, but there is no serrated edge around the label. A white vinyl pressing
  of supposedly only 100 copies was released in 2005. Another limited repressing of 75 copies, this time on blue vinyl (colour
  is darker blue and less transparent than the USA blue vinyl), turned up in 2006.'
