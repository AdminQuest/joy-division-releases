notes: 'LRT101179. Released 30th Sept 98. Advertised as Live: Rainbow Theatre, London 10th Novermber 1979 - but it isn''t.

  Front cover has black round sticker with JOY DIVISION . XXIII.II.MCMLXXX. "THERE MUST BE MORE THAN THIS" which is the date
  for the concert with a V missing . The catalogue number of LRT101179 presumably means London Rainbow theatre 10.11.79.

  Poor sound quality version of the regular soundboard source. The Shadowplay CD features the same soundboard recording of
  this concert and in vastly superior quality.'
