notes: 'Factory ‎– FACT 10

  This record was delivered to the (then) Radio Northland 1ZN station (part of the Radio New Zealand network) in Whangarei
  (approx 100 miles north of Auckland, New Zealand where RTC where based), as one of many promo records for selected airplay.

  The vinyl pressing is essentially identical to the RTC first NZ retail release here. It maintains the same labels, spine
  ridge spacing and structure, track listing and vinyl weight.

  It differs in the following key respects:

  * The outer sleeve is textured and contains no publishing or manufacturing company details whatsoever, just simply: FACT
  10 · A Factory Records Product.

  * There is no printed inner sleeve included, just a plain clear plastic record sleeve.'
