notes: 'This map was issued in October 2008 and is available free from tourist information centres, venues and libraries in
  Salford and via the Visit Salford website (they''ll post it to you). There are more pictures and information at Visit Salford
  website.


  Joy Division related sites on the map include Salford Grammar, Hilton Street rehearsal rooms, De La Salle (Tony Wilson''s
  old school), Howard Devoto''s flat where he organised the Sex Pistols'' gig on June 4 1976 and Oakwood school (where New
  Order played a gig for special needs kids)'
