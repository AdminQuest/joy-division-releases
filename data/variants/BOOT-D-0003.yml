notes: 'Dear Boss JACK030CV 2023

  ''AJANTA THEATRE, DERBY, UK, APR 19TH 1980 - FM BROADCAST'' - Massive as Joy Division were becoming, they still played shit-holes
  like this former, partially demolished, cinema in Derby. The old seats were still in place, except for a few that were torn
  off of their perches to allow dancing, if required. Again, another cavernous sounding audience recording,and again we are
  treated to a joint band version of ''Girls Don''t Count'' for the rarity value. Due to cancellations, probably due to Ian''s
  failing health, this would turn out to be the penultimate Joy Division performance, before... well, you know what happened
  next

  The cover states it''s from an FM broadcast. However, it''s more likely from the longer of the two audience recordings which
  includes Colony and some of the encore jam'
