  issued in a plain sleeve with an insert. The matrix number is the same (Q-9016) and the labels are the same.

  See also Effenaar Concert 18.01.80 LP which is exactly the same but with a different insert

  See also the single LP version of Concert 18 Jan Effenaar LP which is the same LP again but in a different cover.'
