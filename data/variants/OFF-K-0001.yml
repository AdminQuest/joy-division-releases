notes: 'First pressing 25,000 copies 20 June 1980 - stocks ran out by the end of July

  Second pressing 25,000 copies 14 November 1980

  Producer: Martin Hannett

  This flexi disc was given away free. Copies were piled on record shop counters for people to pick up and take away. Factory
  said it would never become a collectors item as they would continue producing them as long as there was a demand ... but
  they didn''t. None the less this record is far from rare.'
