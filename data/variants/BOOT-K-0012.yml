notes: 'V8 : Stiff, black, cardboard sleeve with photocopied inserts.

  The record & labels are identical to the reissued Box File "Komackino" LP; the labels are black on grey, and depict a drawing
  of a man reading a newspaper (same on both sides). The matrix number/run-off groove notations are JD-1A(side 1) and JD-1B
  (side 2). The track-lisiting is the same as the original (and Box File) version.

  It appears that all three of the records in the reissue of the box set have been released individually in poor quality covers.
  Maybe they ran out of boxes.'
