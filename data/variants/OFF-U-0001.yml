notes: "1979 UK LP FACTORY 1st TRANSLUCENT RED VINYL. First Pressing, Translucent Red, Porky Prime Cut, \"This Is The Way/Step\
  \ Inside\" Text in the dead wax ; With Textured Garrod & Lofthouse Sleeve and Complete With Printed Inner Sleeve. Textured\
  \ outer sleeve; printed glossy inner sleeve with square corners. Vinyl is translucent red when held against a strong light.\
  \ \nNote this version has runouts according printed labels and sleeve. Side A is OUTSIDE (black label). Side B is INSIDE\
  \ (white label). Labels have an elevated ring close to the runouts, characteristic for Tranco Limited pressings.\nBack cover:\n\
  FACT 10 · A Factory Records Product.\nPrinted and made in Great Britain by Garrod & Lofthouse Ltd.\nInner:\nRecorded at\
  \ Strawberry Studios, Stockport.\nFACT 10 · A Factory Records Product.\nMispressing exists : Features side 1 of Unknown\
  \ Pleasures and side 2 of 'Power Corruption and Lies'"
