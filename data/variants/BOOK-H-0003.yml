notes: 'Heart and Soul takes you on an intimate and critical journey inside and outside Joy Division and is groundbreaking
  in its sensitivity, insight and sheer voluptuousness.


  The volume offers a cascade of interdisciplinary approaches focusing on the public and personal nature of the suicide of
  Ian Curtis, and how it shaped the band both before and after that iconic tragedy and their subsequent metamorphosis into
  New Order.


  This book will not offer redemption but a creative recovery of a very human story with energy'
