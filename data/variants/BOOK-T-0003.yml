notes: 'VF : Histoire d''une Vie. Written by Ian''s widow Deborah Curtis.

  This is an essential read for anyone who wants to know more about Ian Curtis - the "troubled genius" who was the voice and
  lyricist of Joy Division.

  It details Ian''s troubled private life and untimely, premature death. You''ll also find rare pictures, some in colour,
  a discography and all of Ian''s lyrics, including some unpublished and unfinished ones printed here for the first time.
  Essential for anyone with more than a passing interest in Joy Division.

  Unusually this book has never been issued in a hardback in the UK.

  Touching From A Distance forms the basis for the Control film

  This book is highly recommended by Joy Division Central. Je l''ai en version numérique'
