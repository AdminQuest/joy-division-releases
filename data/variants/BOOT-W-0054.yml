notes: 'V25 Hulme : 2012 : UK release. No record label identified. No catalogue No. 24" x 36" fold-out poster sleeve. Generic
  plain white inner sleeve. Black vinyl with plain white labels; green/lightly marbled yellow / orangey-red vinyl with plain
