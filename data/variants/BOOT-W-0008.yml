notes: 'V2 : RZM Production 1981. Matrix No: RZM-100. Black vinyl in plain sleeve, reissued in orange vinyl in a plain sleeve
  and blue vinyl in a printed sleeve. Poor sound quality

  Also reissued / re-pressed in different sleeves as She''s Lost Control and Joy Division see below.


  Repress of the EP that came with the first version of Warsaw LP + 7". The matrix numbers are in large letters.


  There have been several repressings of this 7" on black vinyl. They all have the same matrix number but aren''t always pressed
  from the same plates as the way the number is written varies.


  There is also a clear vinyl, unlabelled pressing, this appears to be identical with the 7" that came with the clear vinyl
  Warsaw LP+7" issue, but was also issued on its own (supposedly in a limited edition of 100 copies).'
