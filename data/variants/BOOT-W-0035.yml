notes: "V13 pochette collée noire mate RZM 200 mi-late 1980s. American LP. Probably a mid/late '80s pressing. Record label:\
  \ RZM Productions Ltd. Catalogue No: RZM 200. Pressed on blue or black vinyl.. Some came with a free EP (same vinyl colours)\
  \ some didn’t. Sleeve: Paper pasted onto generic card sleeve. No \"Warsaw\" on spine. \nThe labels are very similar to release\
  \ No 6 above. The contours are different, indicating a different pressing, but the information printed on them is identical.\
  \ Thick card non-laminated/non-glossy black pasted sleeve, which otherwise looks similar to the original and other reissues.\
  \ No \"Warsaw\" on spine. \nWhere included, the EP has very small matrix numbers, particularly on side B. In generic plain\
  \ white sleeve with label holes like most of the bonus 7\" EPs. No catalogue number or copyright message on the label."
