notes: 'Pirate copy of the official Factory Sample double 7" EP - released as a 12".

  We think this is probably a Greek pressing. We think it''s probably a bootleg.

  This counterfeit is easy to spot as it is a 12" single instead of 2x7"


  The cover is more or less the same as the original: front cover is both front and back of the original. The back cover is
  like the inside cover of the original fold out, except it is regrouped (side 1 and 2 of the original above side 3 and 4)
  to fit a 12" cover.

  The labels are the "Use no hearing protection" logo with the band names on each side.'
