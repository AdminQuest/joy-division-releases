notes: 'V2 : Pirate copy of the official 12" release on Enigma.

  Looks like this copy is a cross between the regular AIFL 7" bootleg issue (above) and the version that came with an early
  edition of the A History In Cuttings book. This one has a simple folded sleeve made of thin matt grey / green paper which
  is folded along the bottom edge. Note the position of writing on the back of the sleeve.

  Labels have the band name as "The Dallars" like the version above. No lick and stick labels included.

  Bootleg 7" copy of the 12" issue, Red label, Band name as The Dallars. Foldover thin card cover.

  Exists also on white label.

  The sleeve of this release is near identical to the 1978 release. It was printed on a 14" x 14" piece of thin cardstock
  and then folded into four squares, and has a matt finish (not gloss like the later US pressing).'
