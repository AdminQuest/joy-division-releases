notes: 'USA pressing by Eva-Tone Soundsheets

  Bundled free with an issue of the "The Öther Söund" fanzine, probably #2 probably early 1983.

  Black & white individually numbered folder cover - highest number we''ve seen is 450

  The Öther Söund'' fanzine requested permission to house a bunch of the Evatone flexis in special sleeves and give them away
  with

  their fanzine. Factory gave its blessing to the idea so long as no money was made from the record. Buyers got a fanzine
  plus a flexi

  disc in a black and white, number stamped, folded paper cover in a sealed plastic bag with a printed piece of paper along
  the top.

  The paper label along the top said "JOY DIVISION" and "$3.99". The package also included a "Sleep Chamber" loose promo sticker.

  Some copies were issued with the same individually numbered folder cover, but without the fanzine or Sleep Chamber insert
  sticker.

  Same plastic bag and printed piece of paper along the top.'
