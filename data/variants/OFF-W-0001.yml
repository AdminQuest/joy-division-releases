notes: "Vinyl Passion - The following release appeared on the official Record Store Day 2018 web site but was removed after\
  \ a few weeks and long before the actual Record Store Day. Towards the end of March 2018 rumours appeared that the record\
  \ company would be releasing it anyway.\nThis appeared to be planned as a reissue of the unofficial 'Baby Face' 2007 Warsaw\
  \ release on the same record label. \nLate April 2018 some Warsaw bootlegs appeared on Ebay with claims they were RSD releases.\n\
  However these were copies of a \"straightforward\" bootleg which made no such claims, and was available elsewhere for a\
  \ tenth of the price."
