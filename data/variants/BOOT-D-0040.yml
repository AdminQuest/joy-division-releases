notes: 'JDCD 001. Picture CD - dying star logo.

  Source: Live

  This CD was re-released in a digipak case. The colours printed on the CD are different on the digipak version but the matrix
  numbers are the same. Poor sound quality. Some of the songs from Leeds are almost unlistenable at times. This is quite remarkable
  when there are so many high quality recordings of the Amsterdam concert available. The CD sounds as though it has been copied
  from a vinyl LP - although no LPs of this concert are this bad.

  Copy of Soul Of Heart. These two CDs were clearly pressed from the same master but have different covers and different pictures
  on the disk.'
