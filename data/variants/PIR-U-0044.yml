  10 – A FACTORY RECORDS PRODUCT" printed on spine

  and "Printed and made in Great Britain by Garrod & Lofthouse Ltd" printed in the bottom right corner on back cover

  Same labels as original UK pressing, white design on black label, black design on white label

  No printed inner, no insert

  Black vinyl

  No song titles on sleeve or labels

  Run out area considerably wider then the original official UK pressing'
