notes: 'Digital Music ‎– Digital-01. Double LP released May 2004. Limited edition of 200 copies

  Pressed on the following vinyl colours:

  - transparent (orangey-)yellow / transparent greenish-yellow (there appear to be some colour differences between the various
  "yellow" copies!)

  - transparent (orangey-)yellow / transparent green

  - clear / clear

  - transparent red / transparent red (pale red/pinkish colour)

  - dark (purplish-)blue / dark (purplish-)blue

  We''ve also seen a clear (LP1) / transparent red (LP2) version, although we''re not sure if this version was released that
  way or if someone switched the LPs around, either by accident or deliberately.

  We''ve also been informed of these seemingly different versions but we''ve never seen these ourselves.

  - pale green / pale green

  - pale blue / dark blue

  - clear / marble

  Plain black labels with a single letter in gothic typeface (A, B, C & D). Features the complete concert.

