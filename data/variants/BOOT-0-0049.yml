  Printed labels as listing above but pink on black

  Limited to 50 hand-numbered copies

  11 splatter variants (not six as stated) some are similar some not. The fifty numbered sleeves are not synchronized but
  randomized with the splatter variants.

  Not such as the brown/gold release...#02-10 splatter variant 1, #11-20 splatter variant 2...

  The quantity of splatters is randomized, too. Some one-offs, then 2-10 copies each splatter.

  mine : purple/yellow/black

  others : pink/blue splatter ; pink/blue/white/yellow ; pink/black/yellow ; pink/yellow/white ; blue/yellow splatter'
