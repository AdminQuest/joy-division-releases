notes: 'West-German bootleg, released January 1984. Mono.

  Available in three covers, the black and white one, a blue folder cover and plain cover with a glued on black and white
  "subway" picture (clearly they ran out of covers and "made" this one). Blank labels.

  Released as "Glass Is..." in Australia.

  The original blue cover version has "Acid" labels, re pressings have blank labels.

  The black cover version has blank labels.'
