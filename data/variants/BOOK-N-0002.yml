notes: 'New Dawn Fades is a stylish graphic novel adaptation of the highly-acclaimed stage play, New Dawn Fades – The Story
  of Joy Division and Manchester, that was written by Brian Gorman and produced by All Roads Meet Ltd. The play premiered
  in July 2013 at the Manchester Fringe Festival. It toured nationally in April 2016. In April 2018, a new production played
  for four nights at The Dancehouse Theatre, Manchester. The book also includes 8 pages of colour photos from the play.


  New Dawn Fades follows the short, massively-influential career of the iconic late 70’s and early 80’s band Joy Division
  and their impact on popular culture. It’s packed with emotive black and white artwork, historical references and Shay Rowan’s
  striking photos from both versions of the play.


  Written and illustrated by Brian Gorman, design and layout by Giles D Bastow.'
