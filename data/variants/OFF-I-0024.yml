notes: '2014, Warner Music JDPM11, European pressing. 12" EP released for Record Store Day April 19th 2014 Limited to 6,000
  copies of which 1,500 sold in the UK. New cover inspired by the original 12" scaffold sleeve

  Total worldwide pressing volume confirmed as 13,500, with confirmed release quantities of 7,500 in the US and 1,500 in the
  UK, leaving 4,500 RoW.

  Actual US vs EU pressing quantities (totaling 13,500) currently unconfirmed. Both pressing variants confirmed as sold simultaneously
  on release day in RSD supporting record stores in New Zealand and Australia, meaning actual US pressing number may be higher
  than 7,500.'
