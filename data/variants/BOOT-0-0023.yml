notes: 'ALTERNATE STILL (LP) Factory Communications AS22 2022

  US release 2022

  Features live and alternate studio versions of the tracks on the official Still LP

  Limited test pressing edition of 15 numbered copies

  Most on black vinyl, but also a few on purple vinyl

  Some copies issued in a light coloured sleeve, some in a darker sleeve. Both sets of sleeves were numbered, out of 15 and
  10 respectively, but only 15 records were pressed so not all sleeves were used.

  Back cover credits Factory Communications and the labels say A Factory Record, the catalogue number is AS22 (this is printed
  on the spine, on the labels it''s only AS).'
