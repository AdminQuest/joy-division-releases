notes: '(7") PSS 138 Enigma 1981

  Released April 1981. Also released as 12" (see below).

  Issued in a fold-out sleeve, similar to the original official An Ideal For Living 7" EP

  The back features the hand written sleeve to the first demo tape that Terry Mason, then the band''s manager, duplicated
  and sent out to venues hoping to secure a gig. When the venues all said they sounded absolutely terrible Hooky had a listen
  and discovered that Terry had copied the tapes over the air with two cassette recorders side by side and he''d inadvertently
  included the theme to Coronation Street and his mother calling out that his dinner was ready.'
