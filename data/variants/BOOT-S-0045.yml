notes: 'German triple LP box set released 2009

  Black box with grey / silver print on the lid. 40 hand-numbered copies, number is hand-written on the back of box. No catalogue
  number or record label credit. LPs have plain white labels

  The LPs are in individual card sleeves with similar print on the front as the box cover in green (LP 1), maroon (LP 2) and
  black (LP 3), and track listing and recording details on the back.

  All songs remastered in 2008 and 2009 according to the sleeves'
