notes: 'We think the author is called "Karel" but as the book is in Hungarian we''re not sure. It seems to be very similar
  to Mark Johnson''s "Ideal for living" book with some lyrics added.


  Apparently there''s a bit of a story behind this: There were two guys in Hungary who were going to write a Joy Division
  book together, but they couldn''t agree on how to go about it or what to include etc. So in the end they both released their
  own book on the subject. Karel''s book is easiest to find, there were at least 1.000 copies made of that one, the other
  guy''s book seems to be more elusive, we think it was privately published.'
