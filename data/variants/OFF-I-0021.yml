notes: "45 years jubelee edition\nRussian reissue of the official 7\" release on Enigma\nPirate Love Records\nGlossy double-sided\
  \ colour folder cover with gold lettering\nCatalogue number: PILO 044\n500 hand numbered copies \nPressed on gold (200 copies),\
  \ lilac (150 copies), and dark green (150 copies) vinyl\nAll have dark purple / violet labels with white text\n\nIncludes\
  \ 7\" size double-sided printed insert with a live band photo (from Altrincham 14/3/79 by photographer Martin O'Neill) and\
  \ the band name in gold lettering on one side and the song lyrics + web address of the record label and a contact email\
  \ address on the other, and also a postcard size insert with another colourised band photo (from Stockport 28/7/79 by photographer\
  \ Paul Slattery) and the band name in gold lettering on the front and \"Limited edition 500 copies your copy is __\" printed\
  \ on the back, the individual number is hand-written in red marker."
