notes: "\"True Faith An Armchair Guide To New Order, Joy Division, Electronic, Revenge, Monaco and The Other Two\", by Dave\
  \ Thompson with additional input from David Sultan  \nThis book is a chronological affair, moving from one year to the next\
  \ based on the dates of the various singles and album releases, studio session recording dates and the odd live concert\
  \ thrown in for good measure. A bit similar in approach to Mark Johnson's \"An Ideal For Living\", which was based on the\
  \ concerts rather than the release dates. But the comparison stops there. Although True Faith includes plenty of detail,\
  \ for example about bootleg releases, the Joy Division material contains a number of errors and inconsistencies."
