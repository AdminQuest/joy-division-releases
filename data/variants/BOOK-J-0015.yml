notes: First, there was Joy Division. Their music reflected both the barren urban landscape of their native Manchester in
  the late 1970s and singer Ian Curtis's heart of darkness. They remain forever defined by both the suicide of their extraordinary
  and extraordinarily volatile singer and two albums as close to perfection as music can come. From the ashes of Joy Division
  came New Order - their globally popular music bridged the chasm between indie and dance and inspired a generation. Having
  conquered the world and maintained their credibility, they snatched defeat from the jaws of victory and imploded in a tsunami
  of recrimination, while still making fabulous music. It's a tale of death, destroyed friendships and bungled finances, but
  the story of Joy Division and New Order is also the saga of two bands who made extraordinary music which defined their times
  and overturned the musical landscape.
