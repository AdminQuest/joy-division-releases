notes: "Factory ‎– FACT 40 Wrong Master, Gatefold Sleeve\nInitial Italian pressing with wrong mastering: Studio version of\
  \ \"Digital\" is included in the place of \"Glass\" on side A; while \"Walked in line\" and \"Dead Souls\" are switched\
  \ on side B; and there are some different mixing of standard issue tracks. At the end of \"Exercise One\" Ian can be heard\
  \ talking to the control room. Sleeve and labels have the standard tracklist. \nGatefold sleeve with top opening. \nAddress\
  \ on the rear sleeve is 'Base Record Via Castiglione' (instead of 'Via Collamarini' as on later pressings). However, this\
  \ address does not guarantee a wrong master pressing. The wrong master pressing has matrix numbers FACT 40 1/FACT 40 2.\
  \ On copies with corrected tracks it's FACT 1/FACT 2."
