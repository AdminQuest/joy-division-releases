notes: 'Coffret vinyle 2007 réunissant Unknown Pleasures (FACT 10), Closer (FACT 25) et Still (FACT 40 — version 2LP, inclut
  ''Twenty Four Hours'' en piste bonus non mentionnée sur le tracklist imprimé). Artwork minimaliste : aucun texte ni logo
  sur la boîte, les pochettes ou les étiquettes. Boîte extérieure en hessian gris. Pochettes en stock papier d''origine (texturé
  noir pour UP, blanc plain pour Closer, gris hessian hardback fold-out avec ruban blanc pour Still).'
