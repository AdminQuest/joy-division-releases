notes: 'V26 Petit Pulsar : Probably a European bootleg released 2016, Pressed on heavy vinyl. No record label identified.
  No catalogue number on packaging or label. Glossy sleeve. Front cover looks like most of these Warsaw sleeves, but the pulsar
  image is slightly smaller than before. Back cover lists the usual 11 songs, but in one single row unlike the original sleeve,
  and this version actually has 17 songs, as detailed on the insert. "Warsaw" printed on the spine. Black vinyl. Insert: single-sided
  black sheet with the full track listing and Warsaw photo by Kevin Cummins, from Rafters 30 June 1977. One plain black label
  and one with only a detail of the front cover pulsar image "wavy lines".'
