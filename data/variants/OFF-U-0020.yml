notes: 'Rough Trade ‎– FACOZ 1003, Gap Records ‎– FACOZ 1003

  GAP New Zealand Release in non-textured sleeve with printed inner sleeve.

  This release is identical to the later 1984 EMI release here, except this release has totally different labels sometimes
  referred to as the "Green Man" or "Green Shadow".

  The "Green Man" releases are widely believed to have been industry promotional copies or first press test copies from the
  then new GAP New Zealand company that took over from RTC, although this is unproven. It is confirmed that each of the "Green
  Man" releases was later reissued by EMI New Zealand with the same catalog number and yellow EMI labels.

  Recorded at Strawberry Studios, Stockport.

  A Factory Records Product.

  EMI Records New Zealand Limited

  Auckland-Wellington-Christchurch

  P.O.Box 30849 Lower Hutt'
