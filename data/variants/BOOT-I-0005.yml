notes: '(12") Anon A/B Anonymous Records 1981

  A few copies of this came with a four page photocopied insert featuring a Factory discography and a letter from Steve Morris
  circa 1978. The letter was probably originally part of the An Ideal For Living 7" EP music press promo pack. Apparently
  Joy Division were so impatient they sent it out to various music papers before they even got the folder covers back from
  the printers.

  It appears there were two pressings with slightly different labels:

  2. "MADE IN GREAT BRITAIN" on the far right-hand side, next to "45 rpm" and "Stereo".'
