notes: 'Nella storia della musica rock c’è una linea d’ombra. Quella tracciata dai Joy Division nella loro vita così breve,
  eppure mai finita. Bernard Sumner, Peter Hook, Stephen Morris e Ian Curtis, soprattutto lui, sono stati – e lo sono ancora
  oggi, sempre di più, per le nuove generazioni – poeti maledetti, che hanno raccontato tormento ed estasi di quella cosa
  chiamata gioventù, da cui nessuno riesce in fondo mai a uscire. Questa graphic novel si muove in parallelo sui binari della
  ricostruzione, attenta e dettagliata, e dell’evocazione, suggestiva e commovente. Per conoscere chi sono stati i Joy Division
  e perché la loro grandezza non smette mai di crescere, fuori e dentro di noi


  In the history of rock music there is a shadow line. The one traced by Joy Division in their very short, yet never-ending
  life. Bernard Sumner, Peter Hook, Stephen Morris and Ian Curtis, especially him, were – and still are today, more and more,
  for the new generations – cursed poets, who have recounted the torm'
