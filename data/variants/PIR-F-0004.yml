notes: 'Counterfeit copy of A Factory sample (V2)

  Released 2008

  Originally on black vinyl.

  Later reissued on colour vinyl:

  One on solid pale mint green / one on black vinyl

  One on clear vinyl / one on transparent green vinyl

  One on orangey-red vinyl / one on black vinyl

  One on marbled light grey / one on marbled greenish-grey vinyl

  One on solid pale mint green / one  on transparent green vinyl

  One on clear vinyl / one  on black vinyl

  One on orangey-red vinyl / one  on transparent green vinyl



  1) This set comes in a poster sleeve. The original was gatefold and doesn''t open up into a 14" x 14" square.

  2) This set is not shrink wrapped (although it comes in a resealable plastic bag). Original was shrink wrapped in thin crinkly
  plastic. Like a food bag.

  3) Matrix etchings in slightly larger writing than the original.

  4) This counterfeit copy has no raised serrated vinyl edge around the label - the original does.

  5) The stickers are a perfect copy but they look `new`. They do not have `fasprint ` '
