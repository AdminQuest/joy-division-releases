notes: 'Book #9 of the Vinyl Frontier series.


  The Vinyl Frontier series of books looks at the making of seminal recordings, music that was both revolutionary in its time,
  and of long-term lasting impact. In this book Jake Kennedy assesses not only each track recorded in the sessions for the
  debut, but every single attempt the band laid down in the studio prior to that release. The progress of the group is detailed
  not only through their singles, but also through compilation tracks and TV and radio appearances.'
