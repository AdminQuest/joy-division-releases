notes: 'Ian Curtis, avec son groupe, Joy Division, a marqué définitivement son empreinte dans l’industrie musicale.

  Banlieusard de Manchester, Ian Curtis, avec ses acolytes de Joy Division, choisit d’emprunter dès 1976 une destinée punk.
  Après quelques tatonnements, il crééra un univers inédit dans la rock. Précurseur du mouvement dit post-punk, il influencera
  le courant cold wave, new wave, etc.

  Mais le jeune Ian, en proie à ses doutes, ses errances, et d’une santé, aussi bien mentale que physique fragile, son introspection
  dans la noirceur du monde le poussera à commettre l’acte radical le 18 mai 1980. A 23 ans, sa femme, Deborah, le découvre
  pendu dans la cuisine, la veille d’une tournée américaine qui s’annonçait légendaire.

  Le groupe laisse en héritage deux albums (dont un posthume), et ouvre la voie au groupe New Order, fondé par les membres
  de Joy Division.'
