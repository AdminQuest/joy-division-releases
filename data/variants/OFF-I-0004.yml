notes: 'V3.2 : Japanese(?) pressing, 1990s(?)

  2nd(?) fake reissue of the official 7" release on Enigma.

  Plain white labels, black vinyl, smooth shiny/glossy folder cover

  Slightly different from the other fake reissues as the matrix numbers are different, and the cover only folds out once with
  the band picture on the inner left and the soldier picture on the inner right - ie the sleeve is 7" tall and 14" wide, printed
  on both sides, and then folded in half.

  (The official 7" release was printed on one side of a 14" x 14" piece of card and then folded twice to make the sleeve)'
