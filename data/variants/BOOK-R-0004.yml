notes: 'Stephen Morris has had a distinguished career, spanning nearly forty years, as a pivotal member of Joy Division and
  New Order with his trademark machine-like drumming. After the death of Joy Division''s singer, Ian Curtis, in 1980, Bernard
  Sumner, Peter Hook, Morris and his wife Gillian formed New Order, one of the most critically acclaimed and influential bands
  of the late twentieth century. New Order became the flagship band for Tony Wilson''s Factory Records and, alongside him,
  opened the infamous Hacienda nightclub, the centre of the acid house movement. In 2015, after a ten-year hiatus, New Order
  released Music Complete; which charted at #2 in its first week of release (the band''s highest position in over twenty years).


