notes: 'The melodies of Joy Division transcend mere sound, evoking dark, emotionally charged landscapes, vibrating as deep
  narratives in the ether, permeated with intense layerings and dark nuances. This collection is a visual tribute, a bold
  intersection of raw post-punk creativity and the avant-garde of artificial intelligence.


  This work is a courageous and sophisticated attempt to capture the restless spirit that characterizes each Joy Division
  track, transforming it into visual form.


  My journey was not just an artistic exercise. I delved into the entire repertoire of the band, establishing a synesthetic
  dialogue between my artistic vision, artificial intelligence, and the intense melodies of Joy Division. The result? A series
  of images that do not merely emulate, but reinterpret and reprocess the soul and tone of each song, offering a novel and
  innovative visual perspective.


