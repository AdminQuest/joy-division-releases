notes: '2011 UK.counterfeit version of the official 12" single. - Black vinyl - like the original

  Sleeves and labels very similar to the original

  Hand-written band name, title and catalogue number on the spine

  How to tell it apart from the original:

  Sleeve: The white border is whiter and wider than the original. The sleeve is glossier.

  Same cover and labels as the original 12", same hand-written band name, title and label name on the spine.

  Only the runout groove is missing the original "Don''t ever let it fade away" (A side) / "Feel it closing in" (B side) from
  the "Digital" lyrics.'
