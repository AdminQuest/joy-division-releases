notes: 'Factory (US) ‎– FACTUS 6 - Comes in a thick textured rough cardboard cover with textured printed inner sleeve having
  rounded corners at the top.

  Back cover:

  FACTUS VI A Factory Records US Product

  Spine:

  Joy Division FACTUS VI A Factory Records US Product Closer

  Inner sleeve:

  Distributed by Rough Trade

  Produced at Brittania Row

  The vinyl for this release has several variations (hold up to a light source to see): Purple translucent or red translucent
  or green translucent or brown translucent.

  The colors are the result of formulations used for the original pressings, with the purple believed to be the very first
  pressing. The red-tinted version was apparantly more widely distributed.

  Runouts on side A and side B have a monster head etched after matrix references.

  Was reissued in a smooth cardboard cover with a paper printed inner sleeve having straight corners.'
