notes: 'N° 5 : SX-T 107 2009. Pirate copy of Unknown Pleasures released 2009.

  Single sheet insert with printing on both sides, one side has the song lyrics. It''s easy to tell this fake from any official
  pressing as none of the legitimate issues have a lyric insert. Issued on various colours, some marbled, including black,
  grey, byzantium purple, red

  The sleeve appears to have been copied from the official late 1980''s Polish issue and credits the label Tonpress, the cat.no
  is SX-T 107, the same as on the old Polish pressing'
