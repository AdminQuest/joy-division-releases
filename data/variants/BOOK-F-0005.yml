notes: "The music journalist behind this story about Factory Records and the bands who recorded for that label (not just Joy\
  \ Division and New Order like the title suggests) lived in Manchester during this period, so this is a first-hand account\
  \ and would at first glance appear to be rather interesting as such.\nThe almost total lack of interesting photos is a great\
  \ shame though, a book of this many pages could certainly do with some visuals. Unless you have a keen interest in all the\
  \ various Factory bands that are covered in this book - a few \"non-Factory\" band are mentioned as well - you may find\
  \ yourself skipping the odd chapter or two. \nInteresting in parts, but this is mainly for completists and hardcore Joy\
  \ Division / New Order / Factory fans.\n(Reprinted 2002 to coincide with 24 Hour Party People)"
