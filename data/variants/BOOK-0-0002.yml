notes: 'This is a collection of Rob Gretton''s working notebooks kept during his time as Joy Division''s manager.

  It condenses twenty-odd notebooks into one volume, and also contains posters, letters, invoices and studio notes, all dating

  from August 1978 to late 1980. It is 220 pages long, and printed in full colour, with a foreword by Jon Savage.

  These notebooks debunk the myths of the trade (‘Bands, Posters, Lights, Money’ could have been another title for this book);
  sheds new light on one of the most talked-about music scenes in recent times; and perhaps most importantly of all, allows
  us a glimpse of that which so few of us have seen: the real Rob Gretton.'
