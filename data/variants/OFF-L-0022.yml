notes: 'Factory ‎– VFACT 110-3. Side A plays at 45 RPM, side B at 33⅓ RPM. B2 is not listed on sleeve or label. A Fractured
  Music A Factory Record. Editado sob Licença por Vimúsica, Lda.

  The cover is similar to the original 12'''' (with a detail of the Ribaudo family tomb in the Staglieno Cemetery in Genova,
  Italy) but in white background. In the back it has a Vimúsica logo in it, also says "PROIBIDA A VENDA" "PROMOÇÃO" ("SALE
  FORBIDDEN" "PROMOTION"), because this was a edition for the radio stations to promote the record.

  Also in the back "Printed by Tózé - Artes Gráficas - Camarate" (the same as the comercial version but whit location - Camarate
  - added).'
