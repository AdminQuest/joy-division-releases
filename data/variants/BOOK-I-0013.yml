notes: 'This is a 2024 reappraisal of the History in Cuttings books from the 1980s


  "Starting from 1984, a booklet - probably produced in the Netherlands - entitled Joy Division / New Order: A History in
  Cuttings. 1977-1983 began to circulate. A Joy Division ‘scrapbook’, containing an extensive assortment of clippings, reviews,
  and photos, photocopied in black and white A4 and stapled. This book was gradually expanded to include lyrics, discographies,
  and an entire section devoted to New Order.


  With I Remember Nothing. Joy Division. A NEW History in Cuttings 1977-1981 the first edition of  “A History in Cuttings”
  - which covered Joy Division''s adventure from 1979 (Warsaw at the time) until 1981 (release year of the posthumous album
  “Still”) - has been completely re-examined. Almost all the articles, reviews and clippings that were previously disorganized
  and without indications now have a precise date and it''s known from which magazine they were clipped and who wrote them.
