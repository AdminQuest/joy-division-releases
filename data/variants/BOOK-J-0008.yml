notes: En 1980, le suicide de Ian Curtis met un terme à la carrière météoritique de Joy Division, l'une des formations les
  plus novatrices de l'histoire du rock. Le groupe britannique laisse deux albums emblématiques, Unknown Pleasures et Closer,
  ainsi qu'une poignée de singles appelés à faire date, "Transmission", "Atmosphere" ou encore "Love Will Tear Us Apart".
  Les quatre musiciens lèguent aussi un son unique, ciselé sous la férule de leur producteur Martin Hannett, qui n'a cessé
  depuis lors d'inspirer les musiciens du monde entier. L'étude qui suit revient sur les chansons qui ont fait leur carrière,
  depuis leurs débuts sous le nom Warsaw à la transition conduisant les survivants de Joy Division à se réinventer via New
  Order
